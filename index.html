    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
      import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";

      // ⚠️ මෙතනට ඔයාගේ Firebase Config ටික පේස්ට් කරන්න (පිටින් බලන අයට පේන්නේ නැහැ, බය වෙන්න එපා)
      const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      // Register Function
      window.registerUser = () => {
        const email = document.getElementById('reg-email').value;
        const pass = document.getElementById('reg-pass').value;
        if(!email || !pass) { alert("Please fill all fields!"); return; }
        createUserWithEmailAndPassword(auth, email, pass)
          .then(() => { alert("Registration Successful! 🌝"); closeAuth(); })
          .catch((error) => alert(error.message));
      };

      // Login Function
      window.loginUser = () => {
        const email = document.getElementById('log-email').value;
        const pass = document.getElementById('log-pass').value;
        if(!email || !pass) { alert("Please fill all fields!"); return; }
        signInWithEmailAndPassword(auth, email, pass)
          .then(() => { alert("Welcome Back! 🚀"); closeAuth(); })
          .catch((error) => alert(error.message));
      };

      // Check Auth Status (පහළ Button එක Logout/Login කරන්න)
      onAuthStateChanged(auth, (user) => {
        const btnText = document.getElementById('btn-auth-text');
        const authBtn = document.getElementById('auth-btn');
        if (user) {
          btnText.innerText = "LOGOUT";
          authBtn.onclick = () => signOut(auth);
          showPage('home'); // Login වුණාම Home එකට යන්න
        } else {
          btnText.innerText = "LOGIN";
          authBtn.onclick = openAuth;
          showPage('home');
        }
      });
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap');
        
        body { font-family: 'Poppins', sans-serif; background: #000; color: white; margin: 0; overflow-x: hidden; }

        /* Background Animated Container */
        .bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: -1; overflow: hidden; }
        .bg-layer { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0; transition: opacity 1s; animation: panZoom 20s infinite alternate linear; }
        .bg-layer.active { opacity: 0.5; }

        @keyframes panZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.15) translate(-1%, -1%); }
        }

        /* Images */
        #bg-home { background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80'); }
        #bg-bots { background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?q=80'); }

        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s; }
        .page-content { display: none; min-height: 80vh; padding-bottom: 80px; }

        .bot-item { background: rgba(0, 242, 254, 0.05); border: 1px solid rgba(0, 242, 254, 0.2); padding: 12px; border-radius: 15px; font-size: 0.75rem; text-align: center; }

        .auth-input:focus { border-color: #00f2fe; background: rgba(255,255,255,0.08); }

    <script>
        function showPage(pageId) {
            // Page hide/show Logic
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');

            // Background Layer handle Logic
            document.querySelectorAll('.bg-layer').forEach(bg => bg.classList.remove('active'));
            if(document.getElementById('bg-' + pageId)) {
                document.getElementById('bg-' + pageId).classList.add('active');
            } else {
                document.getElementById('bg-home').classList.add('active'); // Default
            }

            window.scrollTo(0,0);
        }

        // Auth Modal Logic
        function openAuth() { document.getElementById('authModal').classList.replace('hidden', 'flex'); }
        window.closeAuth = () => { document.getElementById('authModal').classList.replace('flex', 'hidden'); }
        function toggleAuth() {
            document.getElementById('loginForm').classList.toggle('hidden');
            document.getElementById('registerForm').classList.toggle('hidden');
        }
